<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Retrato de la Dra. Maria Hernandez N. (imagen provisional)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="50%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe0d2"/>
      <stop offset="100%" stop-color="#f7c6b0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#shine)"/>

  <!-- coat/body -->
  <path d="M 130 800 C 150 640 270 560 400 560 C 530 560 650 640 670 800 Z" fill="url(#coat)"/>
  <!-- collar V -->
  <path d="M 340 580 L 400 680 L 460 580 L 460 800 L 340 800 Z" fill="#fff1f2" opacity="0.0"/>
  <path d="M 340 580 L 400 680 L 460 580" fill="none" stroke="#fbcfe8" stroke-width="3"/>

  <!-- neck -->
  <path d="M 365 530 Q 365 580 400 595 Q 435 580 435 530 Z" fill="url(#skin)"/>

  <!-- head -->
  <ellipse cx="400" cy="430" rx="120" ry="140" fill="url(#skin)"/>

  <!-- hair -->
  <path d="M 285 410 C 280 310 340 260 400 260 C 470 260 520 310 520 410 C 520 380 510 360 500 345 C 510 330 495 320 480 325 C 470 300 440 290 410 295 C 390 280 350 285 330 305 C 305 305 285 335 285 370 Z" fill="#3a2020"/>
  <path d="M 285 410 C 280 430 285 470 300 490 C 290 450 295 420 295 400 Z" fill="#3a2020"/>
  <path d="M 520 410 C 525 430 520 470 505 490 C 515 450 510 420 510 400 Z" fill="#3a2020"/>

  <!-- subtle face features (very abstract) -->
  <ellipse cx="365" cy="435" rx="6" ry="3" fill="#3a2020" opacity="0.5"/>
  <ellipse cx="435" cy="435" rx="6" ry="3" fill="#3a2020" opacity="0.5"/>
  <path d="M 380 480 Q 400 495 420 480" fill="none" stroke="#c2185b" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- stethoscope -->
  <path d="M 345 620 Q 320 680 360 720 Q 400 740 440 720 Q 480 680 455 620" fill="none" stroke="#be123c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="745" r="18" fill="#be123c"/>
  <circle cx="400" cy="745" r="10" fill="#fda4af"/>

  <!-- caption pill -->
  <g opacity="0.9">
    <rect x="290" y="70" width="220" height="48" rx="24" fill="#ffffff" opacity="0.85"/>
    <text x="400" y="101" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#9d174d" text-anchor="middle">Dra. Maria Hernandez</text>
  </g>
</svg>
